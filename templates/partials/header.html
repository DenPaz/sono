{% load i18n %}
{% load static %}

<header id="layout-topbar"
        aria-label="{% trans 'Top bar' %}"
        class="flex items-center justify-between px-4"
        data-greeting-morning="{% trans 'Bom dia' %}"
        data-greeting-afternoon="{% trans 'Boa tarde' %}"
        data-greeting-evening="{% trans 'Boa noite' %}"
        x-data="topbarData()">
  <div class="inline-flex gap-3 items-center">
    <label for="layout-sidebar-toggle-trigger"
           class="btn btn-sm btn-ghost btn-square lg:hidden"
           aria-label="{% trans 'Toggle sidebar' %}">
      <span class="iconify lucide--menu size-5" aria-hidden="true"></span>
    </label>
    <div class="hidden flex-col sm:flex">
      <p class="font-medium leading-none md:text-lg">
        <span x-text="greeting"></span>, {{ user.get_full_name|default:user.first_name|default:user.email }}.
      </p>
    </div>
  </div>
  <div class="inline-flex gap-3 items-center">
    <c-brand.theme_toggle class="btn-sm btn-ghost" />
    <div class="dropdown dropdown-bottom dropdown-end">
      <button type="button"
              class="btn btn-sm btn-circle btn-ghost"
              tabindex="0"
              aria-label="{% trans 'User menu' %}">
        <div class="avatar overflow-hidden size-7 bg-base-200 rounded-box">
          <img src="{{ user.profile.get_avatar_url }}"
               alt="{{ user.get_full_name }}" />
        </div>
      </button>
      <div class="dropdown-content w-44 mt-2 bg-base-100 rounded-box shadow-sm"
           tabindex="0">
        <ul class="menu w-full p-2">
          {% if user.is_staff %}
            <li>
              <a href="{% url 'admin:index' %}">
                <span class="iconify lucide--shield size-4" aria-hidden="true"></span>
                <span>{% trans "Admin" %}</span>
              </a>
            </li>
          {% endif %}
          <li>
            <a href="{% url 'assessments:settings' %}">
              <span class="iconify lucide--settings size-4" aria-hidden="true"></span>
              <span>{% trans "Configurações" %}</span>
            </a>
          </li>
        </ul>
        <hr class="border-base-300" />
        <ul class="menu w-full p-2">
          <li>
            <button type="button"
                    class="text-error hover:bg-error/10"
                    onclick="document.getElementById('logout-modal').showModal()">
              <span class="iconify lucide--log-out size-4" aria-hidden="true"></span>
              <span>{% trans "Sign out" %}</span>
            </button>
          </li>
        </ul>
      </div>
    </div>
  </div>
</header>
