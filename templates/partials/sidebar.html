{% load i18n %}
{% load static %}
{% load core_tags %}

<input id="layout-sidebar-toggle-trigger"
       type="checkbox"
       class="hidden"
       aria-label="{% trans 'Toggle layout sidebar' %}" />
<input id="layout-sidebar-hover-trigger"
       type="checkbox"
       class="hidden"
       aria-label="{% trans 'Dense layout sidebar' %}" />
<div id="layout-sidebar-hover" class="w-1 h-screen bg-base-300"></div>
<div id="layout-sidebar" class="sidebar-menu py-3">
  <div class="flex gap-3 items-center justify-between min-h-10 px-5">
    <a href="{% url 'dashboard:index' %}"
       class="font-black text-3xl text-transparent bg-clip-text bg-linear-to-r from-primary to-accent">Sono</a>
    <label for="layout-sidebar-hover-trigger"
           title="{% trans 'Toggle sidebar hover' %}"
           class="btn btn-sm btn-circle btn-ghost relative text-base-content/50 max-lg:hidden">
      <span class="iconify lucide--panel-left-close absolute size-4.5 opacity-100 transition-all duration-300 group-has-[[id=layout-sidebar-hover-trigger]:checked]/html:opacity-0"></span>
      <span class="iconify lucide--panel-left-dashed absolute size-4.5 opacity-0 transition-all duration-300 group-has-[[id=layout-sidebar-hover-trigger]:checked]/html:opacity-100"></span>
    </label>
  </div>
  <div class="custom-scrollbar overflow-auto grow">
    <div class="space-y-0.5 mt-5 px-2.5">
      <a href="{% url 'dashboard:index' %}"
         class="menu-item {% active_class 'dashboard:index' %}">
        <span class="iconify lucide--monitor-dot size-4"></span>
        <p>{% trans "Dashboard" %}</p>
      </a>
    </div>
  </div>
  <div class="sidebar-menu space-y-0.5 mt-3 px-2.5 pt-2 border-base-200 border-t">
    <button type="button"
            class="menu-item w-full cursor-pointer hover:bg-base-200"
            onclick="document.getElementById('logout-modal').showModal()">
      <span class="iconify lucide--log-out size-4"></span>
      <p>{% trans "Logout" %}</p>
    </button>
  </div>
</div>
<label id="layout-sidebar-backdrop" for="layout-sidebar-toggle-trigger"></label>
<dialog id="logout-modal" class="modal">
  <form method="post" action="{% url 'account_logout' %}" class="modal-box">
    {% csrf_token %}
    <h3 class="font-bold text-lg">{% trans "Confirm Logout" %}</h3>
    <p class="py-4">{% trans "Are you sure you want to logout?" %}</p>
    <div class="modal-action">
      <button type="submit" class="btn btn-error">{% trans "Confirm" %}</button>
      <button type="button"
              class="btn"
              onclick="document.getElementById('logout-modal').close()">{% trans "Cancel" %}</button>
    </div>
  </form>
</dialog>
