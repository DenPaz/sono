{% load i18n %}

<div id="questionnaire-step-target"
     data-current-step="{{ current_step }}"
     class="space-y-4">
  {% include "assessments/questionnaire/partials/progress.html" %}
  <form hx-post="{% url 'assessments:questionnaire_step_partial' 4 %}"
        hx-target="#questionnaire-step-target"
        hx-swap="outerHTML"
        class="space-y-3">
    {% csrf_token %}
    <input type="hidden" name="evaluation_id" value="{{ evaluation.id }}" />
    <article class="card bg-base-100 border border-base-300 shadow-sm">
      <div class="card-body gap-2 p-4 md:p-5">
        <h2 class="font-bold text-lg">{% trans "Revisão final" %}</h2>
        <p class="text-sm text-base-content/70">
          {% trans "Confirme as últimas respostas e finalize para calcular o score EDSC." %}
        </p>
      </div>
    </article>
    {% for field in form %}
      <c-assessments.questionnaire.question_item :field="field" item_index="{{ field.name|cut:'q_' }}" />
    {% endfor %}
    {% if form.non_field_errors %}<c-alert :messages="form.non_field_errors" severity="error" />{% endif %}
    <div class="card bg-base-100 border border-base-300 shadow-sm">
      <div class="card-body flex-row justify-between p-4 md:p-5">
        <button type="submit"
                name="action"
                value="back"
                class="btn btn-ghost"
                formnovalidate>{% trans "Voltar" %}</button>
        <button type="submit" name="action" value="finish" class="btn btn-success">
          {% trans "Finalizar questionário" %}
        </button>
      </div>
    </div>
  </form>
</div>
