{% load i18n %}

<section class="card bg-base-100 border border-base-300 shadow-sm">
  <div class="card-body gap-4 p-4 md:p-5">
    <div class="flex items-center justify-between">
      <h2 class="font-bold text-lg">{% trans "Indicadores de Risco" %}</h2>
      <span class="text-xs text-base-content/60">{% trans "Classificação por avaliação" %}</span>
    </div>
    <div class="grid gap-3 md:grid-cols-3">
      {% for indicator in risk_indicators %}
        <article class="p-3 bg-base-200/40 rounded-box border border-base-300">
          <div class="flex gap-2 items-center justify-between">
            <c-assessments.risk_badge :risk_level="indicator.level" />
            <p class="font-black text-xl">{{ indicator.total }}</p>
          </div>
          <p class="mt-2 text-xs text-base-content/60">{{ indicator.label }}</p>
        </article>
      {% endfor %}
    </div>
  </div>
</section>
