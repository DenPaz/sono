{% load i18n %}

<button class="btn btn-circle btn-ghost relative overflow-hidden {{ class }}"
        aria-label="{% trans 'Toggle theme' %}"
        data-theme-control="toggle">
  <span class="iconify lucide--sun absolute size-4.5 opacity-100 translate-y-0 transition-all duration-300 dark:opacity-0 dark:-translate-y-4"></span>
  <span class="iconify lucide--moon absolute size-4.5 opacity-0 translate-y-4 transition-all duration-300 dark:opacity-100 dark:translate-y-0"></span>
</button>
